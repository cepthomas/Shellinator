
; Default shellinator config file - minimal.
;
; Entry format:
;
; If ExplorerContext is one of:
;   Dir => Right click in explorer with a directory selected.
;   DirBg => Right click in explorer right pane with nothing selected (background).
;   DeskBg => Right click in windows desktop with nothing selected (background).
;   Folder => ?? Seems to appear for any directory selection. Probably meant for system use.
; [ExplorerContext key] ; key is the registry key
; menu = text ; as appears in the context menu
; command = do_something arg1 arg2 ; as executed from command line, builtin env vars like %ProgramFiles% are also supported.
;
; If ExplorerContext is File => Right click in explorer with a file selected.
; [File ext1 ext2 ...] ; extN is one or more file extensions this applies to.
; menu and command are the same as above

; TODO1 add these + DeskBg
[Dir findev]
menu = Open directory with Everything
command = %ProgramFiles%\Everything\everything -parent $target

[DirBg findev]
menu = Open here with Everything
command = %ProgramFiles%\Everything\everything -parent $target

[File bat cmd]
menu = Execute
command = cmd /C $target

[File ps1]
menu = Execute PS script
command = powershell -executionpolicy bypass -File $target

[File lua]
menu = Execute lua script
command = lua $target

[File py]
menu = Execute python file
command = py $target

; Default - just try to open with default application.
[File *]
menu = Open
command = cmd /C $target  
